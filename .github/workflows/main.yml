name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Download Gradle
        run: |
          curl -L https://services.gradle.org/distributions/gradle-9.4.0-bin.zip -o gradle.zip
          unzip -q gradle.zip

      - name: Build
        run: ./gradle-9.4.0/bin/gradle build --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: gardenplotbuttons-26.1.2-build
          path: build/libs/*.jar
